services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: synthetic-data:latest
    container_name: synthetic-data
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Inside the container, always bind all interfaces so the published port
      # works. The reverse proxy (if any) lives outside.
      HOST: 0.0.0.0
      PORT: 3001
      FRONTEND_DIST: /app/frontend/dist
      DB_PATH: /app/data/synthetic.db
    ports:
      # HOST_PORT (from .env) → 3001 inside the container
      - "${HOST_PORT:-3001}:3001"
    volumes:
      # SQLite + WAL files persist here. Back this directory up.
      - synthetic-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  synthetic-data:
